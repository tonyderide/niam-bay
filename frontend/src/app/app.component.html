<div class="app-container">
  <header class="glass-card-static app-header">
    <h1 class="app-title">NiamBay</h1>
    <p class="app-subtitle">Des recettes du monde entier avec ce que tu as dans ton frigo</p>
  </header>

  <main class="app-main">
    <app-pantry (searchRecipes)="onSearch($event)"></app-pantry>

    <app-recipe-results
      [recipes]="recipes"
      [loading]="loading"
      (openRecipe)="onOpenRecipe($event)">
    </app-recipe-results>
  </main>

  <app-recipe-detail
    *ngIf="selectedRecipe"
    [recipe]="selectedRecipe"
    (close)="onCloseRecipe()">
  </app-recipe-detail>
</div>
