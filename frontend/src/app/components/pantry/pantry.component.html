<div class="pantry-container">
  <div class="zones">
    <!-- PLACARD -->
    <div class="glass-card-static zone">
      <div class="zone-header">
        <span class="zone-icon">🗄️</span>
        <div>
          <h2>Mon Placard</h2>
          <p class="zone-desc">Ce que j'ai toujours (sauvegardé)</p>
        </div>
      </div>

      <div class="input-wrapper">
        <input
          class="glass-input"
          type="text"
          placeholder="Ajouter un ingrédient..."
          [(ngModel)]="pantryInput"
          (input)="onPantryInputChange()"
          (keydown)="onPantryKeydown($event)"
        />
        <div class="suggestions" *ngIf="activeSuggestionTarget === 'pantry' && filteredSuggestions.length > 0">
          <button
            *ngFor="let s of filteredSuggestions"
            class="suggestion-item"
            (click)="selectSuggestion(s)"
          >{{ s }}</button>
        </div>
      </div>

      <div class="chips">
        <span class="glass-chip" *ngFor="let item of pantryItems; let i = index">
          {{ item }}
          <span class="remove-btn" (click)="removePantryItem(i)">&times;</span>
        </span>
        <span class="empty-msg" *ngIf="pantryItems.length === 0">Aucun ingrédient dans le placard</span>
      </div>
    </div>

    <!-- FRIGO -->
    <div class="glass-card-static zone">
      <div class="zone-header">
        <span class="zone-icon">🧊</span>
        <div>
          <h2>Mon Frigo</h2>
          <p class="zone-desc">Ce que j'ai en ce moment</p>
        </div>
      </div>

      <div class="input-wrapper">
        <input
          class="glass-input"
          type="text"
          placeholder="Ajouter un ingrédient..."
          [(ngModel)]="fridgeInput"
          (input)="onFridgeInputChange()"
          (keydown)="onFridgeKeydown($event)"
        />
        <div class="suggestions" *ngIf="activeSuggestionTarget === 'fridge' && filteredSuggestions.length > 0">
          <button
            *ngFor="let s of filteredSuggestions"
            class="suggestion-item"
            (click)="selectSuggestion(s)"
          >{{ s }}</button>
        </div>
      </div>

      <div class="chips">
        <span class="glass-chip" *ngFor="let item of fridgeItems; let i = index">
          {{ item }}
          <span class="remove-btn" (click)="removeFridgeItem(i)">&times;</span>
        </span>
        <span class="empty-msg" *ngIf="fridgeItems.length === 0">Aucun ingrédient dans le frigo</span>
      </div>
    </div>
  </div>

  <button
    class="glass-button search-btn"
    (click)="onSearch()"
    [disabled]="pantryItems.length === 0 && fridgeItems.length === 0"
  >
    🍳 Trouver des recettes
  </button>
</div>
