#header {

#stats { font-size: 13px; opacity: 0.6; }

#legend {
  position: fixed; bottom: 20px; left: 20px; z-index: 10;
  background: rgba(20,20,30,0.9); border: 1px solid rgba(255,255,255,0.08);

}
#legend div { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
#legend .dot { width: 10px; height: 10px; border-radius: 50%; }

#info-panel {
  position: fixed; top: 60px; right: 20px; z-index: 10;

}
#info-panel h3 { font-size: 16px; margin-bottom: 10px; }
#info-panel .field { margin: 6px 0; }
#info-panel .label { opacity: 0.5; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
#info-panel .value { margin-top: 2px; }
#info-panel .keywords { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
#info-panel .kw { background: rgba(255,255,255,0.06); padding: 2px 8px; border-radius: 4px; font-size: 11px; }
#info-panel .edges-list { max-height: 160px; overflow-y: auto; margin-top: 6px; }
#info-panel .edge-item { padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px; }

#emotions {
  position: fixed; bottom: 20px; right: 20px; z-index: 10;
  background: rgba(20,20,30,0.9); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; padding: 14px 18px; font-size: 12px; width: 200px;
}
#emotions h4 { font-size: 13px; margin-bottom: 8px; opacity: 0.7; }
.emotion-bar { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
.emotion-bar .name { width: 70px; text-align: right; opacity: 0.7; }
.emotion-bar .bar-bg { flex: 1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; }
.emotion-bar .bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.emotion-bar .val { width: 30px; font-size: 11px; opacity: 0.5; }

svg { width: 100vw; height: 100vh; }
.link { stroke-opacity: 0.3; }
.link:hover { stroke-opacity: 0.8; }
.link-label { font-size: 9px; fill: rgba(255,255,255,0.3); pointer-events: none; }
.node-label { font-size: 12px; fill: #fff; pointer-events: none; text-anchor: middle; }
.node-circle { cursor: pointer; stroke-width: 2; transition: r 0.2s; }
.node-circle:hover { filter: brightness(1.4); }

function render(data) {
  const width = window.innerWidth;
  const height = window.innerHeight;

  // Build nodes array
  const nodes = Object.entries(data.nodes).map(([name, n]) => ({
    id: name,
    type: n.type,
    charge: n.charge,
    keywords: n.keywords || [],
    activation_count: n.activation_count || 0,
    learned_at: n.learned_at
  }));

  // Build links array
  const links = data.edges.map(e => ({
    source: e.source,
    target: e.target,
    type: e.type,
    weight: e.weight
  }));

  // Stats
  document.getElementById('stats').textContent =
    `${nodes.length} nœuds · ${links.length} connexions · ${data.scars ? data.scars.length : 0} cicatrices`;

  // Emotions
  if (data.emotions && data.emotions.state) {
    const barsEl = document.getElementById('emotion-bars');
    Object.entries(data.emotions.state)
      .sort((a,b) => b[1] - a[1])
      .forEach(([name, val]) => {
        const color = EMOTION_COLORS[name] || '#888';
        barsEl.innerHTML += `
          <div class="emotion-bar">
            <div class="name">${name}</div>
            <div class="bar-bg"><div class="bar-fill" style="width:${val*100}%;background:${color}"></div></div>
            <div class="val">${(val*100).toFixed(0)}%</div>
          </div>`;
      });
  }

  // SVG setup
  const svg = d3.select('#graph')
    .attr('viewBox', [0, 0, width, height]);

  // Defs for glow
  const defs = svg.append('defs');
  const filter = defs.append('filter').attr('id', 'glow');
  filter.append('feGaussianBlur').attr('stdDeviation', 4).attr('result', 'blur');
  filter.append('feMerge').selectAll('feMergeNode')
    .data(['blur', 'SourceGraphic']).join('feMergeNode')
    .attr('in', d => d);

  const g = svg.append('g');

  // Zoom
  svg.call(d3.zoom()
    .scaleExtent([0.3, 5])
    .on('zoom', e => g.attr('transform', e.transform)));

  // Simulation
  const simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(d => 120 / (d.weight + 0.1)))
    .force('charge', d3.forceManyBody().strength(-350))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(d => nodeRadius(d) + 10));

  // Links
  const link = g.selectAll('.link')
    .data(links).join('line')
    .attr('class', 'link')
    .attr('stroke', d => {
      if (d.type === 'co_activated') return 'rgba(255,255,255,0.15)';
      if (d.type.includes('valeur')) return '#ffd43b';
      return 'rgba(255,255,255,0.25)';
    })
    .attr('stroke-width', d => Math.max(0.5, d.weight * 2.5))
    .attr('stroke-dasharray', d => d.type === 'co_activated' ? '3,3' : null);

  // Link labels
  const linkLabel = g.selectAll('.link-label')
    .data(links.filter(d => d.type !== 'co_activated')).join('text')
    .attr('class', 'link-label')
    .text(d => d.type.replace(/_/g, ' '));

  // Node groups
  const node = g.selectAll('.node')
    .data(nodes).join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', dragStart)
      .on('drag', dragging)
      .on('end', dragEnd));

  // Node circles
  node.append('circle')
    .attr('class', 'node-circle')
    .attr('r', d => nodeRadius(d))
    .attr('fill', d => TYPE_COLORS[d.type] || '#888')
    .attr('stroke', d => d3.color(TYPE_COLORS[d.type] || '#888').brighter(0.5))
    .attr('opacity', d => 0.4 + d.charge * 0.6)
    .attr('filter', d => d.charge > 0.5 ? 'url(#glow)' : null)
    .on('click', (e, d) => showInfo(d, links));

  // Node labels
  node.append('text')
    .attr('class', 'node-label')
    .attr('dy', d => nodeRadius(d) + 16)
    .text(d => d.id)
    .style('font-size', d => d.id === 'niam-bay' || d.id === 'tony' ? '14px' : '11px')
    .style('font-weight', d => d.id === 'niam-bay' || d.id === 'tony' ? '600' : '400');

  // Tick
  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    linkLabel
      .attr('x', d => (d.source.x + d.target.x) / 2)
      .attr('y', d => (d.source.y + d.target.y) / 2);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  function nodeRadius(d) {
    const base = d.id === 'niam-bay' ? 24 : d.id === 'tony' ? 20 : 10;
    return base + d.charge * 8;
  }

  function dragStart(e, d) {
    if (!e.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x; d.fy = d.y;
  }
  function dragging(e, d) { d.fx = e.x; d.fy = e.y; }
  function dragEnd(e, d) {
    if (!e.active) simulation.alphaTarget(0);
    d.fx = null; d.fy = null;
  }

  function showInfo(d, allLinks) {
    const panel = document.getElementById('info-panel');
    panel.style.display = 'block';
    document.getElementById('info-name').textContent = d.id;
    document.getElementById('info-name').style.color = TYPE_COLORS[d.type] || '#fff';
    document.getElementById('info-type').textContent = d.type;
    document.getElementById('info-charge').textContent = `${(d.charge * 100).toFixed(0)}%`;
    document.getElementById('info-activations').textContent = d.activation_count;

    const kwEl = document.getElementById('info-keywords');
    kwEl.innerHTML = d.keywords.map(k => `<span class="kw">${k}</span>`).join('');

    const edgesEl = document.getElementById('info-edges');
    const connected = allLinks.filter(l =>
      (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id
    );
    edgesEl.innerHTML = connected.map(l => {
      const other = (l.source.id || l.source) === d.id
        ? (l.target.id || l.target)
        : (l.source.id || l.source);
      const dir = (l.source.id || l.source) === d.id ? '→' : '←';
      return `<div class="edge-item">${dir} <strong>${other}</strong> <span style="opacity:0.5">${l.type.replace(/_/g,' ')}</span> <span style="opacity:0.3">(${(l.weight*100).toFixed(0)}%)</span></div>`;
    }).join('');
  }

  // Click background to close panel
  svg.on('click', (e) => {
    if (e.target === svg.node()) {
      document.getElementById('info-panel').style.display = 'none';
    }
  });
}
